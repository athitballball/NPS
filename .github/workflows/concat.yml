# .github/workflows/concat.yml
name: Concat Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"    # 08:00 น. ทุกวัน (UTC+7)

jobs:
  concat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas google-auth google-api-python-client

      - name: Run concat script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python concat_sheet.py
